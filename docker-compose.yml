services:
  axios-calc:
    build: .
    container_name: axios-calc
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=public"
      - "traefik.http.routers.axios-calc.rule=Host(`axioscalc.sgdev.cloud`)"
      - "traefik.http.routers.axios-calc.entrypoints=websecure"
      - "traefik.http.routers.axios-calc.tls=true"
      - "traefik.http.routers.axios-calc.tls.certresolver=meuresolver"
      - "traefik.http.routers.axios-calc.service=axios-calc"
      - "traefik.http.services.axios-calc.loadbalancer.server.port=3000"
      - "traefik.http.services.axios-calc.loadbalancer.server.scheme=http"
    env_file:
      - .env
    environment:
      DATABASE_URL: "file:/app/data/prod.db"
      NODE_ENV: "production"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
networks:
  public:
    external: true
